version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    volumes:
      - ..:/app:cached
    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity
    # Ensure it uses the same network as the root compose
    networks:
      - cbm-network

  db:
    # Use the same configuration as the root compose for the DB
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cbm_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cbm-network

networks:
  cbm-network:
    driver: bridge

volumes:
  postgres_data:
