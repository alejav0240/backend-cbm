version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    env_file:
      - ../../.env
    volumes:
      - ..:/app:cached
    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity
    # Ensure it uses the same network as the root compose
    networks:
      - cbm-network
    depends_on:
      - db

  db:
    # Use the same configuration as the root compose for the DB
    image: postgres:15
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cbm-network

networks:
  cbm-network:
    driver: bridge

volumes:
  postgres_data:

